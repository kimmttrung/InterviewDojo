name: InterviewDojo CI/CD Pipeline

on:
  pull_request:
    branches: [main, develop]

jobs:
  test-and-report:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # --- 1. CHUẨN BỊ DATABASE (NEON) ---
      - name: Create Neon Branch
        id: create-db-branch
        uses: neondatabase/create-branch-action@v5
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          parent_branch: db-new
          branch_name: test-branch-${{ github.event.pull_request.number || 'local' }}
          api_key: ${{ secrets.NEON_API_KEY }}

      # --- 2. BACKEND ---
      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install

      - name: Generate Prisma Client
        run: |
          cd backend
          npx prisma generate
        env:
          DATABASE_URL: ${{ steps.create-db-branch.outputs.db_url }}

      - name: Run Prisma Migrate
        run: |
          cd backend
          npx prisma migrate reset --force
          npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ steps.create-db-branch.outputs.db_url }}

      - name: Run Backend Unit Tests
        run: |
          cd backend
          npm run test
        env:
          DATABASE_URL: ${{ steps.create-db-branch.outputs.db_url }}
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      # - name: Build Backend
