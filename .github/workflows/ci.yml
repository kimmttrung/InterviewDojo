      #     sleep 15 # Tăng thêm một chút để chắc chắn server đã lên
      #   env:
      #     DATABASE_URL: ${{ steps.create-db-branch.outputs.db_url }}
      #     REDIS_HOST: localhost
      #     REDIS_PORT: 6379
      #     JWT_SECRET: ${{ secrets.JWT_SECRET }}

      # # Run Frontend
      # - name: Install Frontend Dependencies
      #   run: |
      #     cd frontend
      #     npm install

      # - name: Start Frontend
      #   run: |
      #     cd frontend
      #     npm run dev &
      #     npx wait-on http://127.0.0.1:5173 --timeout 60000

      # # --- 3. E2E (PLAYWRIGHT) ---
      # - name: Install Root Dependencies (Playwright)
      #   run: npm install

      # - name: Install Playwright Browsers
      #   run: npx playwright install --with-deps

      # - name: Run E2E Tests
      #   run: npx playwright test
      #   continue-on-error: true
      #   env:
      #     DATABASE_URL: ${{ steps.create-db-branch.outputs.db_url }}
      #     BACKEND_URL: http://localhost:3000

      - name: Delete Neon Branch
        if: always()
        run: |
          npm install -g neonctl@2
          BRANCH_NAME="test-branch-${{ github.event.pull_request.number || 'local' }}"
          neon branch delete --project-id ${{ secrets.NEON_PROJECT_ID }} "$BRANCH_NAME" --api-key ${{ secrets.NEON_API_KEY }} || echo "Cleaned"

